services:
  chatbot:
    build: .
    image: limmes-chatbot:latest
    container_name: limmes-chatbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist vector store, conversations, and budget state across restarts
      - chatbot_vectorstore:/app/.vectorstore
      - chatbot_sessions:/app/.sessions
      - chatbot_budget:/app/.budget
      # Mount your knowledge base read-only — re-ingest after editing
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://localhost:8000/health').status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Daily backup sidecar ─────────────────────────────────────────────────
  # Copies vectorstore, sessions, and budget state to a timestamped backup
  # folder every 24 hours. Set BACKUP_KEEP_DAYS to control retention.
  backup:
    image: alpine:3.20
    container_name: limmes-chatbot-backup
    restart: unless-stopped
    volumes:
      - chatbot_vectorstore:/data/vectorstore:ro
      - chatbot_sessions:/data/sessions:ro
      - chatbot_budget:/data/budget:ro
      - chatbot_backups:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        KEEP_DAYS=$${BACKUP_KEEP_DAYS:-7}
        while true; do
          STAMP=$$(date +%Y-%m-%d_%H%M%S)
          echo "[backup] Starting daily backup: $$STAMP"
          mkdir -p /backups/$$STAMP
          cp -a /data/vectorstore /backups/$$STAMP/vectorstore 2>/dev/null || true
          cp -a /data/sessions /backups/$$STAMP/sessions 2>/dev/null || true
          cp -a /data/budget /backups/$$STAMP/budget 2>/dev/null || true
          # Prune backups older than KEEP_DAYS
          find /backups -maxdepth 1 -type d -mtime +$$KEEP_DAYS -exec rm -rf {} + 2>/dev/null || true
          echo "[backup] Done. Sleeping 24h. Keeping last $$KEEP_DAYS days."
          sleep 86400
        done
    environment:
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-7}
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # Optional PostgreSQL backend — uncomment to enable.
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: chatbot
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: chatbot
  #   volumes:
  #     - chatbot_pg:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  chatbot_vectorstore:
  chatbot_sessions:
  chatbot_budget:
  chatbot_backups:
  # chatbot_pg:
